name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Switch core dependency to fork source
        run: bash scripts/core-source.sh fork

      - name: Install dependencies
        run: npm ci

      - name: Verify core source status
        run: npm run core:status

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test
